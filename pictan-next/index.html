<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>pictan</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 4rem 1.5rem;
      color: #181715;
      background: #faf9f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0;
      color: #6b6862;
      font-size: 0.95rem;
    }
    .dot {
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      background: #cc785c;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1><span class="dot"></span>pictan</h1>
  <p>Preview environment</p>
</body>
</html>
